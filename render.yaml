services:
  - type: static
    name: sc-cipdata-lookup-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_USE_LOOKUP_MOCK
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
